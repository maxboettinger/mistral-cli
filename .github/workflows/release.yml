name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: checks
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/moxtral/
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC) — no API token needed
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Verify tag matches project version
        run: |
          version="$(uv version --short)"
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${version}"
            exit 1
          fi
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub release with the published artifacts
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
