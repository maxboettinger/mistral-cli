name: Release

# Fully automated: any push to main whose pyproject.toml version has no
# matching v<version> tag yet is released — full CI matrix, PyPI publish via
# Trusted Publishing, then tag + GitHub release (created only after a
# successful publish, so failed runs retry automatically).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      unreleased: ${{ steps.check.outputs.unreleased }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - id: check
        name: Is this version already tagged?
        run: |
          version="$(uv version --short)"
          if [ -z "$(git ls-remote --tags origin "refs/tags/v${version}")" ]; then
            unreleased=true
          else
            unreleased=false
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "unreleased=${unreleased}" >> "$GITHUB_OUTPUT"
          echo "version ${version} unreleased=${unreleased}"

  checks:
    needs: version
    if: needs.version.outputs.unreleased == 'true'
    uses: ./.github/workflows/ci.yml

  publish:
    needs: [version, checks]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/moxtral/
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC) — no API token needed
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: [version, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Tag and create GitHub release with the published artifacts
        run: |
          gh release create "v${VERSION}" dist/* \
            --target "$GITHUB_SHA" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
